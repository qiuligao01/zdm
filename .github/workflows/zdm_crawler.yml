name: zdm_crawler

on:
  schedule:
    - cron: "0/15 * * * *"
  workflow_dispatch:
    inputs:
      should_commit:
        description: '立即生成提交记录'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 unzip wget

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | awk '{print $3}')
          wget -O chromedriver.zip "https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
          unzip -o chromedriver.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: database_old.db
          key: ${{ runner.os }}-database_old-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-database_old-

      - name: Prepare database
        id: db_copy
        run: |
          if [ -f database_old.db ]; then
            LAST_COUNT=$(sqlite3 database_old.db "SELECT COUNT(*) FROM ZDM;" 2>/dev/null || echo 0)
            cp database_old.db database.db
          elif [ -f database.db ]; then
            LAST_COUNT=$(sqlite3 database.db "SELECT COUNT(*) FROM ZDM;" 2>/dev/null || echo 0)
          else
            LAST_COUNT=0
          fi

          echo "last_count=$LAST_COUNT" >> "$GITHUB_OUTPUT"
          echo "Last count: $LAST_COUNT"

      - name: Build with Maven
        run: |
          mvn -B clean package
          cp ./target/zdm-0.0.1.jar ./zdm.jar

      - name: Main logic
        env:
          maxPageSize: 10
          minVoted: 0
          minComments: 0
          MIN_PUSH_SIZE: 1
          emailHost: smtp.qq.com
          emailPort: 465
          emailAccount: ${{ secrets.emailAccount }}
          emailPassword: ${{ secrets.emailPassword }}
          spt: ${{ secrets.spt }}
          detail: false
        run: java -jar zdm.jar

      - name: Check database changes
        id: commit_check
        env:
          COMMIT_THRESHOLD: 50
        run: |
          LAST_COUNT=${{ steps.db_copy.outputs.last_count }}

          if [ -f database.db ]; then
            CURRENT_COUNT=$(sqlite3 database.db "SELECT COUNT(*) FROM ZDM;" 2>/dev/null || echo 0)
          else
            CURRENT_COUNT=0
          fi

          NEW_ROWS=$((CURRENT_COUNT - LAST_COUNT))

          echo "Last count: $LAST_COUNT"
          echo "Current count: $CURRENT_COUNT"
          echo "New rows: $NEW_ROWS"

          if [ "$NEW_ROWS" -ge "$COMMIT_THRESHOLD" ]; then
            echo "should_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_commit=false" >> "$GITHUB_OUTPUT"
          fi

          cp database.db database_old.db

      - name: Git add files
        if: steps.commit_check.outputs.should_commit == 'true' || github.event.inputs.should_commit == 'true'
        run: |
          git add database.db

      - name: Commit and push
        if: steps.commit_check.outputs.should_commit == 'true' || github.event.inputs.should_commit == 'true'
        uses: actions-go/push@master
        with:
          author-email: 'actions@github.com'
          author-name: 'GitHub Actions'
          commit-message: 'update articles'
          token: ${{ secrets.GIT_TOKEN }}
